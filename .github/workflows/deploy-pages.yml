# .github/workflows/ — CI: deploy static frontend to GitHub Pages.
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    concurrency:
      group: pages
      cancel-in-progress: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject backend URL
        run: |
          BACKEND_URL="${{ secrets.BACKEND_URL }}"
          if [ -z "$BACKEND_URL" ]; then
            echo "::error::BACKEND_URL secret is not set. GitHub Pages will call localhost and chat sessions will fail."
            echo "Add your Railway HTTPS URL in: Repo Settings > Secrets and variables > Actions > New repository secret (name BACKEND_URL)."
            BACKEND_URL="https://REPLACE_ME.railway.app"
          fi
          # Replace only the assignment (not the fallback check) so we don't overwrite the real URL with localhost
          find frontend -name "*.html" -exec sed -i "s|window.API_BASE = \"__BACKEND_URL__\"|window.API_BASE = \"$BACKEND_URL\"|g" {} \;

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
