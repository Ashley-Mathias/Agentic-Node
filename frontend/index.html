<!DOCTYPE html>
<!-- frontend/ — static chat UI (HTML, CSS, JavaScript). -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Agentic Node – Chat interface for data analysis and HR knowledge. Ask questions in natural language or upload documents.">
  <title>Agentic Node</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/chat.css">
  <link rel="stylesheet" href="css/input.css">
  <link rel="stylesheet" href="css/mobile.css">
  <!-- Agentic Node theme: dusty rose + black (applied inline so it always shows) -->
  <style>
    :root {
      --color-brand-bg: #c9a9a6;
      --color-header: #1a1a1a;
      --color-text: #1a1a1a;
      --color-primary: #1a1a1a;
      --color-surface: rgba(255,255,255,0.92);
      --color-surface-alt: rgba(255,255,255,0.75);
      --color-border: rgba(26,26,26,0.12);
    }
    body { background-color: #c9a9a6 !important; background-image: url("assets/agentic_node.png") !important; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; color: #1a1a1a !important; }
    .chat-layout { background: transparent !important; }
    .chat-header { background: #1a1a1a !important; color: #fff !important; }
    .main-content { background: transparent !important; }
    .messages { background: rgba(255,255,255,0.75) !important; }
    .input-bar { background: rgba(255,255,255,0.92) !important; border-color: rgba(26,26,26,0.12) !important; }
    .btn-send, .btn-attach { background: #1a1a1a !important; color: #fff !important; }
    .message-user .bubble { background: #1a1a1a !important; color: #fff !important; }
    .message-bot .bubble { background: rgba(255,255,255,0.92) !important; color: #1a1a1a !important; border-color: rgba(26,26,26,0.12) !important; }
  </style>
  <!-- Ensure new chat session list styling applies even if sidebar.css path fails -->
  <style>
    #sessionList.sidebar-session-list { display: flex; flex-direction: column; flex: 1; min-height: 0; overflow-y: auto; gap: 0.375rem; padding: 0.75rem 0.5rem; border-top: 1px solid rgba(255,255,255,0.08); }
    #sessionList .sidebar-session-item { display: flex; align-items: center; gap: 0.75rem; padding: 0.6875rem 1rem; border-radius: 12px; color: rgba(255,255,255,0.92); font-size: 0.9375rem; font-weight: 500; cursor: pointer; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.06); width: 100%; min-height: 44px; box-sizing: border-box; transition: background 0.2s, color 0.2s; }
    #sessionList .sidebar-session-item:hover { background: rgba(255,255,255,0.14); color: #fff; }
    #sessionList .sidebar-session-item.active { background: rgba(255,255,255,0.18); color: #fff; border-color: rgba(255,255,255,0.12); }
    #sessionList .sidebar-session-item-title { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #sessionList .sidebar-session-item-delete { flex-shrink: 0; width: 28px; height: 28px; padding: 0; border: none; background: transparent; color: rgba(255,255,255,0.5); cursor: pointer; border-radius: 8px; display: flex; align-items: center; justify-content: center; }
    #sessionList .sidebar-session-item-delete:hover { background: rgba(220,38,38,0.3); color: #fecaca; }
  </style>
</head>
<body>
  <!-- API_BASE: __BACKEND_URL__ replaced by GitHub Actions; local dev falls back to localhost -->
  <script>
    window.API_BASE = "__BACKEND_URL__";
    if (!window.API_BASE || window.API_BASE === "__BACKEND_URL__") window.API_BASE = "http://localhost:8000";
    if (!sessionStorage.getItem("agentic_node_authenticated")) {
      window.location.replace("login.html");
    }
  </script>

  <div class="app-shell" id="appShell" data-testid="app-shell">
    <aside class="sidebar" id="sidebar" aria-label="Navigation" data-testid="sidebar">
      <div class="sidebar-header" data-testid="sidebar-header">
        <span class="sidebar-title">Menu</span>
      </div>
      <nav class="sidebar-nav" data-testid="sidebar-nav">
        <button type="button" class="sidebar-item" id="newChatBtn" data-testid="new-chat-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M12 5v14M5 12h14"/></svg>
          <span>New chat</span>
        </button>
        <div class="sidebar-session-list" id="sessionList" aria-label="Chat sessions" role="list" data-testid="session-list"></div>
        <a href="login.html" class="sidebar-item sidebar-item-logout" id="logoutLink" data-testid="logout-link">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          <span>Log out</span>
        </a>
      </nav>
    </aside>

    <div class="main-content">
      <main class="chat-layout" role="application" aria-label="Chat">
        <header class="chat-header" data-testid="chat-header">
          <button type="button" class="sidebar-toggle" id="sidebarToggle" aria-label="Toggle menu" aria-expanded="false" data-testid="sidebar-toggle">
            <svg class="sidebar-toggle-icon icon-open" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M3 12h18M3 6h18M3 18h18"/></svg>
            <svg class="sidebar-toggle-icon icon-close" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
          <div class="chat-header-inner">
            <div>
              <h1>Agentic Node</h1>
              <p class="chat-subtitle">Ask questions or upload documents. Data and policy answers in one place.</p>
            </div>
          </div>
        </header>

        <section
          class="messages"
          id="messages"
          role="log"
          aria-label="Conversation"
          aria-live="polite"
          data-testid="messages"
        >
          <article class="message message-bot" id="welcomeMessage" aria-label="Welcome message" data-testid="welcome-message">
            <div class="bubble">
              <p>Ask a question in plain language (e.g. &quot;Show employee salary distribution by department&quot; or &quot;What is our vacation policy?&quot;) or attach a PDF, DOCX, or TXT file to add it to the knowledge base.</p>
            </div>
          </article>
        </section>

        <section class="input-bar" aria-label="Compose message" data-testid="input-bar">
          <input
            type="file"
            id="fileInput"
            accept=".pdf,.docx,.txt"
            class="file-input"
            aria-label="Attach document (PDF, DOCX or TXT)"
            title="Attach document"
            data-testid="file-input"
          >
          <label for="fileInput" class="btn btn-attach" title="Attach document" data-testid="attach-file-btn">
            Attach File
          </label>
          <label for="messageInput" class="sr-only">Your question</label>
          <textarea
            id="messageInput"
            rows="1"
            placeholder="Type your question..."
            maxlength="2000"
            aria-label="Type your question"
            autocomplete="off"
            data-testid="message-input"
          ></textarea>
          <button type="button" id="sendBtn" class="btn btn-send" aria-label="Send message" data-testid="send-btn">
            Send
          </button>
        </section>
      </main>
    </div>

    <div class="sidebar-overlay" id="sidebarOverlay" aria-hidden="true" data-testid="sidebar-overlay"></div>
  </div>

  <script>
    console.log("[App] Inline script running");
    (function () {
      var apiBase = window.API_BASE || "";
      var sessionListEl = document.getElementById("sessionList");
      var shell = document.getElementById("appShell");
      var overlay = document.getElementById("sidebarOverlay");
      var toggleBtn = document.getElementById("sidebarToggle");
      var messagesEl = document.getElementById("messages");
      var welcomeEl = document.getElementById("welcomeMessage");

      function toggleSidebar() { if (shell) shell.classList.toggle("sidebar-open"); }
      if (toggleBtn) toggleBtn.addEventListener("click", toggleSidebar);
      if (overlay) overlay.addEventListener("click", toggleSidebar);

      var logoutLink = document.getElementById("logoutLink");
      if (logoutLink) logoutLink.addEventListener("click", function (e) {
        e.preventDefault();
        sessionStorage.removeItem("agentic_node_authenticated");
        window.location.href = "login.html";
      });

      function escapeHtml(str) {
        if (str == null) return "";
        var div = document.createElement("div");
        div.textContent = str;
        return div.innerHTML;
      }

      function buildBotBubbleHtml(payload) {
        if (!payload) return "<p>No response content.</p>";
        var html = "";
        if (payload.error) html += "<div class=\"bubble-error\">" + escapeHtml(payload.error) + "</div>";
        if (payload.summary) html += "<p>" + escapeHtml(payload.summary).replace(/\n/g, "<br>") + "</p>";
        if (payload.table && Array.isArray(payload.table) && payload.table.length > 0) {
          var keys = Object.keys(payload.table[0]);
          var thead = "<tr>";
          keys.forEach(function (k) { thead += "<th>" + escapeHtml(k) + "</th>"; });
          thead += "</tr>";
          var tbody = "";
          payload.table.forEach(function (row) {
            tbody += "<tr>";
            keys.forEach(function (k) {
              var val = row[k];
              tbody += "<td>" + escapeHtml(val != null ? String(val) : "") + "</td>";
            });
            tbody += "</tr>";
          });
          var tid = "dl-table-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
          html += "<div class=\"bubble-table-wrap\" id=\"" + tid + "\"><table><thead>" + thead + "</thead><tbody>" + tbody + "</tbody></table></div>";
          html += "<button type=\"button\" class=\"btn-download btn-download-csv\" data-table-id=\"" + tid + "\">Download CSV</button>";
        }
        if (payload.chart_image) {
          var cid = "dl-chart-" + Date.now() + "-" + Math.random().toString(36).slice(2, 8);
          html += "<div class=\"bubble-chart\"><img id=\"" + cid + "\" src=\"data:image/png;base64," + payload.chart_image + "\" alt=\"Chart\" /></div>";
          html += "<button type=\"button\" class=\"btn-download btn-download-png\" data-chart-id=\"" + cid + "\">Download PNG</button>";
        }
        if (payload.sql_query) html += "<div class=\"bubble-sql\"><span class=\"bubble-sql-label\">Generated SQL</span>" + escapeHtml(payload.sql_query) + "</div>";
        return html || "<p>No response content.</p>";
      }

      function showChatError(msg) {
        if (!messagesEl || !welcomeEl) return;
        var err = document.createElement("div");
        err.className = "message message-bot";
        err.innerHTML = "<div class=\"bubble\"><div class=\"bubble-error\">" + escapeHtml(msg) + "</div></div>";
        messagesEl.appendChild(err);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function loadSessionIntoChat(sessionId) {
        window.__currentSessionId = sessionId;
        if (!messagesEl || !welcomeEl) return;
        var url = apiBase.replace(/\/$/, "") + "/api/sessions/" + encodeURIComponent(sessionId);
        fetch(url)
          .then(function (res) {
            if (!res.ok) return res.json().then(function (body) {
              throw new Error(body.detail || "Failed to load chat (" + res.status + ")");
            }).catch(function (e) {
              if (e.message) throw e;
              throw new Error("Failed to load chat (" + res.status + ")");
            });
            return res.json();
          })
          .then(function (session) {
            if (!session || typeof session !== "object") {
              showChatError("Invalid response from server.");
              return;
            }
            var msgs = session.messages;
            if (!Array.isArray(msgs)) msgs = [];
            var toRemove = [];
            for (var i = 0; i < messagesEl.children.length; i++) {
              if (messagesEl.children[i] !== welcomeEl) toRemove.push(messagesEl.children[i]);
            }
            toRemove.forEach(function (el) { el.remove(); });
            if (msgs.length === 0) {
              welcomeEl.style.display = "";
              welcomeEl.scrollIntoView && welcomeEl.scrollIntoView({ behavior: "smooth" });
              refreshSessions();
              return;
            }
            welcomeEl.style.display = "none";
            for (var j = 0; j < msgs.length; j++) {
              var m = msgs[j];
              var role = (m.role === "user") ? "user" : "bot";
              var wrap = document.createElement("div");
              wrap.className = "message message-" + role;
              wrap.setAttribute("data-testid", role === "user" ? "message-user" : "message-bot");
              var bubble = document.createElement("div");
              bubble.className = "bubble";
              if (role === "user") {
                var p = document.createElement("p");
                p.textContent = m.content || "";
                bubble.appendChild(p);
              } else {
                bubble.innerHTML = buildBotBubbleHtml(m.payload != null ? m.payload : { summary: m.content || "" });
              }
              wrap.appendChild(bubble);
              messagesEl.appendChild(wrap);
            }
            messagesEl.scrollTop = messagesEl.scrollHeight;
            refreshSessions();
          })
          .catch(function (err) {
            if (welcomeEl) welcomeEl.style.display = "";
            showChatError(err.message || "Could not load chat history. Is the backend running?");
            refreshSessions();
          });
      }

      function renderSessionItem(session, isActive) {
        var wrap = document.createElement("div");
        wrap.className = "sidebar-session-item" + (isActive ? " active" : "");
        wrap.dataset.sessionId = session.id;
        wrap.setAttribute("data-testid", "session-item");
        var title = document.createElement("span");
        title.className = "sidebar-session-item-title";
        title.setAttribute("data-testid", "session-item-title");
        title.textContent = session.title || "New chat";
        wrap.appendChild(title);
        var delBtn = document.createElement("button");
        delBtn.type = "button";
        delBtn.className = "sidebar-session-item-delete";
        delBtn.setAttribute("aria-label", "Delete chat");
        delBtn.setAttribute("data-testid", "session-item-delete");
        delBtn.innerHTML = "<svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2\"/><line x1=\"10\" y1=\"11\" x2=\"10\" y2=\"17\"/><line x1=\"14\" y1=\"11\" x2=\"14\" y2=\"17\"/></svg>";
        wrap.appendChild(delBtn);
        return wrap;
      }

      function renderSessionsList(sessions, currentId) {
        if (!sessionListEl) return;
        sessionListEl.innerHTML = "";
        (sessions || []).forEach(function (s) {
          var item = renderSessionItem(s, s.id === currentId);
          item.addEventListener("click", function (e) {
            if (e.target.closest(".sidebar-session-item-delete")) return;
            loadSessionIntoChat(s.id);
            var items = sessionListEl.querySelectorAll(".sidebar-session-item");
            for (var i = 0; i < items.length; i++) {
              items[i].classList.toggle("active", items[i].dataset.sessionId === s.id);
            }
            if (shell) shell.classList.remove("sidebar-open");
          });
          var delBtn = item.querySelector(".sidebar-session-item-delete");
          if (delBtn) delBtn.addEventListener("click", function (e) {
            e.stopPropagation();
            if (!apiBase) return;
            var id = item.dataset.sessionId;
            fetch(apiBase.replace(/\/$/, "") + "/api/sessions/" + encodeURIComponent(id), { method: "DELETE" })
              .then(function () {
                if (window.__currentSessionId === id) {
                  window.__currentSessionId = null;
                  resetToWelcome();
                  if (welcomeEl) welcomeEl.style.display = "";
                }
                refreshSessions();
              });
          });
          sessionListEl.appendChild(item);
        });
      }

      function refreshSessions() {
        if (!apiBase) return;
        fetch(apiBase.replace(/\/$/, "") + "/api/sessions")
          .then(function (res) { return res.ok ? res.json() : Promise.reject(new Error(res.status)); })
          .then(function (data) { renderSessionsList(data.sessions || [], window.__currentSessionId || null); })
          .catch(function () { if (sessionListEl && sessionListEl.children.length === 0) renderSessionsList([]); });
      }

      function resetToWelcome() {
        if (!messagesEl || !welcomeEl) return;
        welcomeEl.style.display = "";
        var toRemove = [];
        for (var i = 0; i < messagesEl.children.length; i++) {
          if (messagesEl.children[i] !== welcomeEl) toRemove.push(messagesEl.children[i]);
        }
        toRemove.forEach(function (el) { el.remove(); });
        messagesEl.scrollTop = 0;
      }

      var newChatBtn = document.getElementById("newChatBtn");
      if (newChatBtn) {
        newChatBtn.addEventListener("click", function (e) {
          e.preventDefault();
          e.stopImmediatePropagation();
          if (window.__newChatInProgress) return;
          window.__newChatInProgress = true;
          if (!apiBase) {
            window.__newChatInProgress = false;
            return;
          }
          var url = apiBase.replace(/\/$/, "") + "/api/sessions?title=" + encodeURIComponent("New chat");
          fetch(url, { method: "POST" })
            .then(function (res) {
              if (!res.ok) return res.json().then(function (d) { throw new Error(d.detail || res.status); });
              return res.json();
            })
            .then(function (session) {
              window.__currentSessionId = session.id;
              resetToWelcome();
              refreshSessions();
              setTimeout(function () { if (shell) shell.classList.remove("sidebar-open"); }, 300);
            })
            .catch(function (err) {
              console.error("[App] New chat failed:", err);
              window.__currentSessionId = null;
              resetToWelcome();
            })
            .finally(function () { window.__newChatInProgress = false; });
        }, true);
      }

      if (messagesEl) {
        messagesEl.addEventListener("click", function (e) {
          var csvBtn = e.target.closest(".btn-download-csv");
          if (csvBtn && csvBtn.dataset.tableId) {
            var wrap = document.getElementById(csvBtn.dataset.tableId);
            if (wrap && wrap.querySelector("table")) {
              var table = wrap.querySelector("table");
              var rows = [];
              table.querySelectorAll("tr").forEach(function (tr) {
                var cells = [];
                tr.querySelectorAll("th, td").forEach(function (td) {
                  cells.push('"' + (td.textContent || "").replace(/"/g, '""') + '"');
                });
                rows.push(cells.join(","));
              });
              var blob = new Blob([rows.join("\n")], { type: "text/csv;charset=utf-8;" });
              var a = document.createElement("a");
              a.href = URL.createObjectURL(blob);
              a.download = "table-data.csv";
              a.click();
              URL.revokeObjectURL(a.href);
            }
            return;
          }
          var pngBtn = e.target.closest(".btn-download-png");
          if (pngBtn && pngBtn.dataset.chartId) {
            var img = document.getElementById(pngBtn.dataset.chartId);
            if (img && img.src) {
              var a = document.createElement("a");
              a.href = img.src;
              a.download = "chart.png";
              a.click();
            }
          }
        });
      }

      if (apiBase) refreshSessions();
    })();
  </script>
  <script type="module" src="js/app.js"></script>
  <script>
    window.addEventListener("error", function (e) {
      console.error("[App] Global error:", e.message, e.filename, e.lineno, e.colno, e.error);
    });
  </script>
</body>
</html>
