<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to Agentic Node.">
  <title>Sign in – Agentic Node</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
  <!-- Agentic Node theme: dusty rose + black (inline so it always applies) -->
  <style>
    body { background-color: #c9a9a6 !important; background-image: url("assets/agentic_node.png") !important; background-size: cover !important; background-position: center !important; background-repeat: no-repeat !important; }
    .login-layout { background-color: #c9a9a6 !important; background-image: url("assets/agentic_node.png") !important; background-size: cover !important; background-position: center !important; }
    .login-header { background: #1a1a1a !important; color: #fff !important; }
    .btn-login { background: #1a1a1a !important; color: #fff !important; }
    .btn-login:hover { background: #333 !important; }
  </style>
</head>
<body>
  <main class="login-layout" role="main" data-testid="login-layout">
    <div class="login-card" data-testid="login-card">
      <header class="login-header" data-testid="login-header">
        <h1>Agentic Node</h1>
        <p class="login-subtitle">Sign in to continue</p>
        <p class="login-demo-creds" data-testid="login-demo-creds">
          Demo login – Email: <strong>agenticnode@gmail.com</strong> &nbsp; Password: <strong>agenticnode2026</strong>
        </p>
      </header>

      <form id="loginForm" class="login-form" novalidate data-testid="login-form">
        <div class="form-group" data-testid="form-group-email">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
            data-testid="login-email"
          >
        </div>
        <div class="form-group" data-testid="form-group-password">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
            data-testid="login-password"
          >
        </div>
        <p id="loginError" class="login-error" role="alert" aria-live="polite" hidden data-testid="login-error"></p>
        <button type="submit" id="submitBtn" class="btn btn-login" data-testid="login-submit">Sign in</button>
      </form>
    </div>
  </main>
  <script type="module" src="js/login.js"></script>
</body>
</html>
