<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sign in to the AI Data Analyst and HR Knowledge Assistant.">
  <title>Sign in – AI Data Analyst & HR Knowledge Assistant</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/login.css">
</head>
<body>
  <main class="login-layout" role="main">
    <div class="login-card">
      <header class="login-header">
        <h1>AI Data Analyst & HR Knowledge Assistant</h1>
        <p class="login-subtitle">Sign in to continue</p>
      </header>

      <form id="loginForm" class="login-form" novalidate>
        <div class="form-group">
          <label for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            autocomplete="email"
            required
          >
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="••••••••"
            autocomplete="current-password"
            required
          >
        </div>
        <p id="loginError" class="login-error" role="alert" aria-live="polite" hidden></p>
        <button type="submit" id="submitBtn" class="btn btn-login">Sign in</button>
      </form>
    </div>
  </main>
  <script type="module" src="js/login.js"></script>
</body>
</html>
